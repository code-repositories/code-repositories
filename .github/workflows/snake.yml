name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"  # 6시간마다
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#64C8FF&color_dots=#03060C,#0a1528,#1a3a5c,#3d7cb8,#64C8FF

      - name: Verify generated files
        run: ls -la dist

      - name: Push to output branch
        run: |
          cd dist
          git init -q -b output
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "chore: update snake animation"
          git push -f \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            output
