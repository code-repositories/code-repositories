name: Generate Snake
 
on:
  schedule:
    - cron: "0 */6 * * *"  # 6시간마다
  workflow_dispatch:
  push:
    branches:
      - main
 
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: code-repositories
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#64C8FF&color_dots=#03060C,#0a1528,#1a3a5c,#3d7cb8,#64C8FF
 
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
