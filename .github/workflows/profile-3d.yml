name: Generate 3D Profile

on:
  schedule:
    - cron: "0 18 * * *"  # 매일 UTC 18:00 (KST 03:00)
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    name: generate-github-3d-contrib
    steps:
      - uses: actions/checkout@v5

      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & push (with retry)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .

          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi

          git commit -m "chore: update 3d profile"

          # 최대 5번 재시도: fetch → rebase → push
          for i in 1 2 3 4 5; do
            echo "=== push attempt $i ==="
            git fetch origin main || true
            git rebase origin/main || git rebase --abort || true
            if git push origin HEAD:main; then
              echo "push succeeded"
              exit 0
            fi
            echo "push failed, retrying in $((i * 10))s..."
            sleep $((i * 10))
          done

          echo "push failed after 5 attempts"
          exit 1
